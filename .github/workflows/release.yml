name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  win-build:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm run deploy:win
        env:
          GH_TOKEN: '${{ secrets.GH_TOKEN }}'

  mac-build:
    name: MacOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm run deploy:mac
        env:
          GH_TOKEN: '${{ secrets.GH_TOKEN }}'

  linux-build:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm run deploy:linux
        env:
          GH_TOKEN: '${{ secrets.GH_TOKEN }}'

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [win-build, mac-build, linux-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Changelog
        run: pnpm run changelog:lint

      - name: Extract release notes
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 | tail -n +2 > release_notes.txt
          cat release_notes.txt

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release_notes.txt
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

